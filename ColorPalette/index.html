<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Colour Palette Generator</h1>
        <p class="subtitle">Enter how many colours you want, then click the button or press the G key.</p>
        <h2 id="countHeading">0 colours on screen</h2>
        <div class="controls">
            <input type="number" id="colorCount" placeholder="Enter number of colours" min="1" max="20">
            <button id="generateBtn">Generate Colours</button>
            <button id="clearBtn">Clear Message</button>
        </div>
        <p id="message"></p>
        <p class="note">You can generate between 1 and 20 colours. Click a colour to copy its HEX code.</p>

        <div class="palette" id="palette"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
